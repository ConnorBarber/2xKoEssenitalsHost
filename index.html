    <!-- Netlify Identity emails link to the site root; bounce invite/confirmation/
         recovery/email-change tokens straight to the admin CMS, which is the only
         page that knows how to process them. -->
    <script type="text/javascript">
      (function(hash) {
        if (/^#\/?(confirmation|invite|recovery|email_change)_token=/.test(hash)) {
          window.location.replace('/admin/' + hash);
        }
      })(window.location.hash)
    </script>

    <!-- Single Page App redirect script for GitHub Pages -->
    <script type="text/javascript">
      // This script restores the correct URL after a 404.html redirect on GitHub Pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
